name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  native:
    name: Native (${{ matrix.flag }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flag: linux
            coverage_file: coverage-linux.xml
          - os: macos-latest
            flag: macos
            coverage_file: coverage-macos.xml
          - os: windows-latest
            flag: windows
            coverage_file: coverage-windows.xml

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev

      - name: Install MoonBit on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Update dependencies
        run: |
          moon version
          moon update

      - name: Check
        run: moon check --target native

      - name: Test
        run: moon test --target native

      - name: Generate coverage report
        run: moon coverage analyze -p justjavac/global_hotkey -- -f cobertura -o ${{ matrix.coverage_file }}

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ${{ matrix.coverage_file }}
          flags: ${{ matrix.flag }}
          name: ${{ matrix.flag }}
          disable_search: true
